<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MachAI • Product Links</title>

<style>

:root{
--bg1:#0f172a;
--bg2:#1e1b4b;
--text:#ffffff;
--muted:rgba(255,255,255,.75);
--shopee:#ee4d2d;
--tiktok:#000000;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:linear-gradient(160deg,var(--bg1),var(--bg2));
color:var(--text);
}

.wrap{
max-width:980px;
margin:auto;
padding:20px;
}

.shell{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
border-radius:20px;
padding:18px;
backdrop-filter:blur(12px);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.brand{
display:flex;
gap:12px;
align-items:center;
}

/* LOGO */

.logo{
width:56px;
height:56px;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,.2);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

/* buttons */

.cta{
padding:10px 14px;
border-radius:12px;
text-decoration:none;
font-weight:800;
font-size:13px;
}

.cta.tiktok{
background:#000;
color:white;
}

.cta.email{
background:rgba(255,255,255,.08);
color:white;
}

.note{
font-size:12px;
margin-top:4px;
opacity:.8;
}

.tools{
margin-top:14px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
color:white;
}

.grid{
margin-top:16px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

@media (min-width:760px){
.grid{grid-template-columns:repeat(3,1fr);}
}

.item{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
border-radius:16px;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.img{
height:130px;
border-radius:12px;
overflow:hidden;
}

.img img{
width:100%;
height:100%;
object-fit:cover;
}

.title{
font-weight:800;
font-size:14px;
}

.desc{
font-size:12px;
opacity:.8;
}

/* buttons */

.btns{
margin-top:auto;
display:flex;
gap:8px;
}

.button{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
font-weight:800;
font-size:13px;
text-decoration:none;
}

/* Shopee orange */

.buy{
background:var(--shopee);
color:white;
}

/* TikTok black */

.tiktokbtn{
background:var(--tiktok);
color:white;
}

.footer{
margin-top:16px;
font-size:12px;
opacity:.7;
}

</style>
</head>

<body>

<div class="wrap">
<div class="shell">

<div class="top">

<div class="brand">

<div class="logo">
<img src="logo.png">
</div>

<div>
<b>MachAI • Product Links</b><br>
<small>Nostalgia Factory • Viral 90s Snacks</small>
<div class="note">13K followers • 2.5M views</div>
</div>

</div>

<div>

<a class="cta tiktok" href="https://www.tiktok.com/@mach.ai" target="_blank">
TikTok Profile
</a>

</div>

</div>

<div class="tools">
<input id="search" placeholder="Search snacks...">
</div>

<div class="grid" id="list"></div>

<div class="footer">
Some links may be affiliate links.
</div>

</div>
</div>

<script>

const items=[

{
title:"Nata de Coco",
desc:"Classic jelly snack from the 90's",
image:"nata.png",
link:"https://shopee.ph/"
},

{
title:"Mik-Mik Milk Candy",
desc:"Powder milk candy ng 90's kids",
image:"mikmik.JPG",
link:"https://shopee.ph/"
},

{
title:"Sweet Corn Snack",
desc:"Affordable nostalgic snack",
image:"sweetcorn.png",
link:"https://shopee.ph/"
}

]

const container=document.getElementById("list")
const search=document.getElementById("search")

function render(){

const q=search.value.toLowerCase()

container.innerHTML=""

items
.filter(i=>i.title.toLowerCase().includes(q))
.forEach(p=>{

container.innerHTML+=`

<div class="item">

<div class="img">
<img src="${p.image}">
</div>

<div class="title">${p.title}</div>
<div class="desc">${p.desc}</div>

<div class="btns">

<a class="button buy" href="${p.link}" target="_blank">
Shopee
</a>

<a class="button tiktokbtn" href="https://www.tiktok.com/@mach.ai" target="_blank">
TikTok
</a>

</div>

</div>

`

})

}

search.addEventListener("input",render)

render()

</script>

</body>
</html>
