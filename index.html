<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MachAI • Product Links</title>

<style>

:root{
--bg1:#0f172a;
--bg2:#1e1b4b;

--blue:#38bdf8;
--violet:#8b5cf6;

--shopee:#ee4d2d;
--tiktok:#000;

--text:#ffffff;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:linear-gradient(160deg,var(--bg1),var(--bg2));
color:white;
}

.wrap{
max-width:980px;
margin:auto;
padding:20px;
}

.shell{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
border-radius:20px;
padding:18px;
backdrop-filter:blur(10px);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:12px;
}

.brand{
display:flex;
gap:12px;
align-items:center;
}

.logo{
width:56px;
height:56px;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,.2);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
margin:0;
font-size:18px;
}

.sub{
font-size:13px;
opacity:.9;
}

.note{
font-size:12px;
opacity:.7;
margin-top:4px;
}

/* Header buttons */

.ctaRow{
display:flex;
gap:10px;
}

.cta{
padding:12px 18px;
border-radius:14px;
text-decoration:none;
font-weight:800;
font-size:13px;
}

.follow{
background:linear-gradient(90deg,var(--blue),var(--violet));
color:white;
}

.profile{
background:#000;
color:white;
border:1px solid rgba(255,255,255,.15);
}

.search{
margin-top:16px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
color:white;
}

.sectionTitle{
margin-top:20px;
font-weight:900;
font-size:14px;
}

.grid{
margin-top:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

@media (min-width:760px){
.grid{grid-template-columns:repeat(3,1fr)}
}

.item{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
border-radius:16px;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.img{
height:140px;
border-radius:12px;
overflow:hidden;
}

.img img{
width:100%;
height:100%;
object-fit:cover;
}

.badges{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.badge{
font-size:11px;
padding:4px 8px;
border-radius:999px;
background:rgba(255,255,255,.08);
}

.trending{
background:linear-gradient(90deg,var(--blue),var(--violet));
}

.viral{
background:#ee4d2d33;
border:1px solid #ee4d2d;
}

.title{
font-weight:800;
font-size:14px;
}

.desc{
font-size:12px;
opacity:.8;
}

.btns{
margin-top:auto;
display:flex;
gap:8px;
}

.button{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
font-weight:800;
font-size:13px;
text-decoration:none;
}

.buy{
background:var(--shopee);
color:white;
}

.tiktok{
background:var(--tiktok);
color:white;
}

.footer{
margin-top:16px;
font-size:12px;
opacity:.7;
}

</style>
</head>

<body>

<div class="wrap">
<div class="shell">

<div class="top">

<div class="brand">

<div class="logo">
<img src="logo.png">
</div>

<div>
<h1>MachAI • Product Links</h1>
<div class="sub">Nostalgia Factory • Viral 90s Snacks</div>
<div class="note">13K followers • 2.5M views</div>
</div>

</div>

<div class="ctaRow">

<a class="cta follow" href="https://www.tiktok.com/@mach.ai" target="_blank">
Follow on TikTok
</a>

<a class="cta profile" href="https://www.tiktok.com/@mach.ai" target="_blank">
@mach.ai
</a>

</div>

</div>

<div class="search">
<input id="search" placeholder="Search products...">
</div>

<div class="sectionTitle">⭐ Trending Products</div>
<div class="grid" id="featured"></div>

<div class="sectionTitle">🛒 All Products</div>
<div class="grid" id="list"></div>

<div class="footer">
Some links may be affiliate links.
</div>

</div>
</div>

<script>

const items=[

{
title:"Nata de Coco",
desc:"Classic jelly snack from the 90's",
image:"nata.png",
link:"https://shopee.ph/",
tags:["trending","viral"]
},

{
title:"Mik-Mik Milk Candy",
desc:"Powder milk candy ng 90's kids",
image:"mikmik.JPG",
link:"https://shopee.ph/",
tags:["trending","viral"]
},

{
title:"Sweet Corn Snack",
desc:"Affordable nostalgic snack",
image:"sweetcorn.png",
link:"https://shopee.ph/",
tags:[]
}

]

const container=document.getElementById("list")
const featured=document.getElementById("featured")
const search=document.getElementById("search")

function card(p){

let badges=""

if(p.tags.includes("trending"))
badges+=`<span class="badge trending">⭐ Trending</span>`

if(p.tags.includes("viral"))
badges+=`<span class="badge viral">🔥 From my viral TikTok</span>`

return`

<div class="item">

<div class="img">
<img src="${p.image}">
</div>

<div class="badges">${badges}</div>

<div class="title">${p.title}</div>

<div class="desc">${p.desc}</div>

<div class="btns">

<a class="button buy" href="${p.link}" target="_blank">
Shopee
</a>

<a class="button tiktok" href="https://www.tiktok.com/@mach.ai" target="_blank">
TikTok
</a>

</div>

</div>

`

}

function render(){

let q=search.value.toLowerCase()

container.innerHTML=""

items
.filter(i=>i.title.toLowerCase().includes(q))
.forEach(p=>container.innerHTML+=card(p))

featured.innerHTML=""

items
.filter(i=>i.tags.includes("trending"))
.forEach(p=>featured.innerHTML+=card(p))

}

search.addEventListener("input",render)

render()

</script>

</body>
</html>
